name: build
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: riscv64
            platform: linux/riscv64
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: setup qemu
        uses: docker/setup-qemu-action@v3

      - name: write private key
        run: |
          echo "${{ secrets.ALPINE_PRIVKEY }}" > ${{ github.workspace }}/.privkey
          chmod 600 ${{ github.workspace }}/.privkey

      - name: build pkgs
        run: |
          mkdir -p output_packages
          chmod 777 output_packages
          PKGS=$(ls ${{ github.workspace }}/main/)
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -v ${{ github.workspace }}/gh-pages:/gh-pages \
            -w /work \
            --platform ${{ matrix.platform }} \
            -e PKGS="$PKGS" \
            alpine:latest sh /work/.github/scripts/build-inner.sh

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: output_packages/
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: download and merge artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: new-packages/
          merge-multiple: true
        continue-on-error: true

      - name: merge with existing gh-pages
        run: |
          mkdir -p public
          if [ -d gh-pages ]; then
            cp -a gh-pages/. public/
            rm -rf public/.git
          fi
          if [ -d new-packages ]; then
            cp -a new-packages/. public/
          fi
          mkdir -p public/keys
          cp keys/*.pub public/keys/
          echo "Final contents:"
          find public/ -type f

      - name: deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
